    <main>
      <header class="media-hero" data-media-hero>
        <video
          class="media-hero-video media-hero-video--viewport-fixed"
          autoplay
          muted
          loop
          playsinline
          aria-hidden="true"
        >
          <source src="media/100_0928.MP4" type="video/mp4" />
        </video>
        <div class="media-hero-scrim" aria-hidden="true"></div>
        <h1 class="media-hero-title">Media</h1>
      </header>

      <!-- Vocal reels: hosted on YouTube -->
      <section class="media-section media-section--vocal" aria-labelledby="vocal-heading">
        <h2 id="vocal-heading">Vocal</h2>
        <div class="media-vocal-grid">
          <figure class="media-embed">
            <div class="media-embed-player">
              <iframe
                class="media-youtube"
                src="https://www.youtube.com/embed/bqXy1Z_LSdc?rel=0&amp;modestbranding=1"
                title="Vocal Reel (YouTube)"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
                loading="lazy"
              ></iframe>
            </div>
          </figure>
        </div>
      </section>

      <section class="media-section media-section--dance" aria-labelledby="dance-heading">
        <h2 id="dance-heading">Dance</h2>
        <div class="media-dance-grid">
          <figure class="media-dance-cell media-dance-cell--tall">
            <img
              src="dance/tbcfall2024-40_Original.jpeg"
              width="1365"
              height="2048"
              alt="Babitha dancing outdoors in a blue dress, autumn park"
              loading="lazy"
            />
          </figure>
          <figure class="media-dance-cell media-dance-cell--video media-dance-cell--choreo">
            <iframe
              class="media-dance-youtube"
              src="https://www.youtube.com/embed/IienXG8cqUo?rel=0&amp;modestbranding=1"
              title="Soulsista (YouTube)"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </figure>
          <figure class="media-dance-cell media-dance-cell--wide">
            <img
              src="dance/IMG_2384.jpeg"
              width="3000"
              height="2000"
              alt="Ensemble contemporary dance on a dark stage in light costumes"
              loading="lazy"
            />
          </figure>
          <figure class="media-dance-cell media-dance-cell--video media-dance-cell--reel">
            <div class="media-dance-reel-frame">
              <video
                controls
                playsinline
                preload="metadata"
                width="720"
                height="960"
                poster="media/dance-reel-0417-poster.jpg"
                title="Dance reel"
              >
                <source src="media/Babitha Srirajan Dance Reel copy.mov" type="video/quicktime" />
              </video>
            </div>
          </figure>
        </div>
      </section>

                  class="media-modelling-arrow"
