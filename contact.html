  <body class="page-contact">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="logo" href="index.html">Babitha Srirajan</a>
        <button
          type="button"
          class="nav-toggle"
          data-nav-toggle
          aria-expanded="false"
          aria-label="Open menu"
        >
          Menu
        </button>
        <nav class="nav-main" data-nav aria-label="Primary">
          <a href="about.html">about</a>
          <a href="resume.html">resume</a>
          <a href="gallery.html">media</a>
          <a class="is-active" href="contact.html">contact</a>
          <a href="portfolio.html">design</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="contact-page">
        <div class="contact-layout">
          <div class="contact-form-column">
            <h1 class="contact-title" id="contact-heading">Get in touch!</h1>
            <form
              class="contact-form"
              data-contact-form
              aria-labelledby="contact-heading"
            >
              <div class="contact-field-row">
                <div class="contact-field">
                  <label class="contact-label" for="contact-first">First Name</label>
                  <input
                    id="contact-first"
                    type="text"
                    name="firstName"
                    autocomplete="given-name"
                    required
                  />
                </div>
                <div class="contact-field">
                  <label class="contact-label" for="contact-last">Last Name</label>
                  <input
                    id="contact-last"
                    type="text"
                    name="lastName"
                    autocomplete="family-name"
                    required
                  />
                </div>
              </div>
              <div class="contact-field">
                <label class="contact-label" for="contact-email">Email</label>
                <input
                  id="contact-email"
                  type="email"
                  name="email"
                  autocomplete="email"
                  required
                />
              </div>
              <div class="contact-field">
                <label class="contact-label" for="contact-message">Message</label>
                <textarea
                  id="contact-message"
                  name="message"
                  rows="5"
                  required
                ></textarea>
              </div>
              <div class="contact-actions">
                <button type="submit" class="contact-submit">Submit</button>
              </div>
            </form>
            <p class="contact-thanks" data-thanks>Thanks! Nice to meet you :)</p>
          </div>
          <figure class="contact-visual">
            <img
              src="dance/tbcfall2024-40_Original.jpeg"
              width="1365"
              height="2048"
              alt="Babitha dancing outdoors in a blue dress, autumn park"
              loading="eager"
              decoding="async"
            />
          </figure>
        </div>
      </div>
    </main>
